global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: rhinopeak-dashboard

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: rhinopeak-backend
    metrics_path: /api/metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: mongodb
    static_configs:
      - targets: ["mongodb-exporter:9216"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
