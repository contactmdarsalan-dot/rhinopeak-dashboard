services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RHINOPEAK_SECRET_KEY: dev-secret-key-change-before-production-123456
      RHINOPEAK_DEBUG: "1"
      RHINOPEAK_PRODUCTION: "0"
      RHINOPEAK_MONGO_URI: mongodb://mongodb:27017
      RHINOPEAK_MONGO_DB_NAME: rhinopeak_dashboard
      RHINOPEAK_REDIS_URL: redis://redis:6379/0
      RHINOPEAK_REDIS_ENABLED: "1"
      RHINOPEAK_ALLOWED_HOSTS: localhost,127.0.0.1,backend,0.0.0.0
      RHINOPEAK_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080
      RHINOPEAK_EXPOSE_RESET_TOKEN: "0"
      RHINOPEAK_ENABLE_METRICS: "1"
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next-build
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    restart: unless-stopped
    command: ["--mongodb.uri=mongodb://mongodb:27017"]
    depends_on:
      mongodb:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - mongodb-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana:11.1.4
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-rhinopeak-local-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:
