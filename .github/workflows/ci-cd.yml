name: RhinoPeak CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  RHINOPEAK_SECRET_KEY: ci-secret-key-for-rhinopeak-dashboard-1234567890
  RHINOPEAK_DEBUG: "1"
  RHINOPEAK_PRODUCTION: "0"
  RHINOPEAK_ALLOWED_HOSTS: localhost,127.0.0.1
  RHINOPEAK_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
  RHINOPEAK_REDIS_ENABLED: "0"
  RHINOPEAK_LOG_LEVEL: WARNING
  NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload vulnerability scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RHINOPEAK_MONGO_URI: mongodb://localhost:27017
      RHINOPEAK_MONGO_DB_NAME: rhinopeak_ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Backend tests with coverage
        working-directory: backend
        run: |
          coverage run --rcfile=../.coveragerc manage.py test apps.rhinopeak
          coverage xml --rcfile=../.coveragerc
          coverage report --rcfile=../.coveragerc --fail-under=80

      - name: AI parser holdout evaluation
        working-directory: backend
        run: python manage.py evaluate_gpt_model --min-document-success=0.60 --min-line-item-f1=0.70 --max-latency-ms=100

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RHINOPEAK_MONGO_URI: mongodb://localhost:27017
      RHINOPEAK_MONGO_DB_NAME: rhinopeak_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run E2E tests
        run: npm run test:e2e -- --output=.next-verify/e2e-results

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.22.3"
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    needs: [security, backend, frontend, e2e, mobile]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          target: production
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          target: runner
          push: true
          tags: ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
