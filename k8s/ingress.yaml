apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rhinopeak
  namespace: rhinopeak
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rhinopeak.example.com
        - api.rhinopeak.example.com
      secretName: rhinopeak-tls
  rules:
    - host: rhinopeak.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rhinopeak-frontend
                port:
                  number: 3000
    - host: api.rhinopeak.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rhinopeak-backend
                port:
                  number: 8000

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rhinopeak-backend
  namespace: rhinopeak
spec:
  podSelector:
    matchLabels:
      app: rhinopeak
      component: backend
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rhinopeak
              component: frontend
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 27017
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 443
