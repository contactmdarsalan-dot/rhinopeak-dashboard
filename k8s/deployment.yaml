apiVersion: v1
kind: Namespace
metadata:
  name: rhinopeak

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rhinopeak-config
  namespace: rhinopeak
data:
  mongo-uri: mongodb://mongodb:27017
  mongo-db-name: rhinopeak_dashboard
  redis-url: redis://redis:6379/0
  cors-origins: https://rhinopeak.example.com
  allowed-hosts: rhinopeak.example.com,api.rhinopeak.example.com
  frontend-url: https://rhinopeak.example.com

---
apiVersion: v1
kind: Secret
metadata:
  name: rhinopeak-secrets
  namespace: rhinopeak
type: Opaque
stringData:
  secret-key: replace-with-at-least-32-random-characters

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhinopeak-backend
  namespace: rhinopeak
  labels:
    app: rhinopeak
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rhinopeak
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rhinopeak
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/metrics
        prometheus.io/port: "8000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: ghcr.io/contactmdarsalan-dot/rhinopeak-dashboard-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: RHINOPEAK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rhinopeak-secrets
                  key: secret-key
            - name: RHINOPEAK_DEBUG
              value: "0"
            - name: RHINOPEAK_PRODUCTION
              value: "1"
            - name: RHINOPEAK_ENABLE_METRICS
              value: "1"
            - name: RHINOPEAK_MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: rhinopeak-config
                  key: mongo-uri
            - name: RHINOPEAK_MONGO_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: rhinopeak-config
                  key: mongo-db-name
            - name: RHINOPEAK_REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: rhinopeak-config
                  key: redis-url
            - name: RHINOPEAK_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: rhinopeak-config
                  key: cors-origins
            - name: RHINOPEAK_ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: rhinopeak-config
                  key: allowed-hosts
            - name: RHINOPEAK_FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: rhinopeak-config
                  key: frontend-url
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhinopeak-frontend
  namespace: rhinopeak
  labels:
    app: rhinopeak
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rhinopeak
      component: frontend
  template:
    metadata:
      labels:
        app: rhinopeak
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/contactmdarsalan-dot/rhinopeak-dashboard-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.rhinopeak.example.com/api
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: rhinopeak-backend
  namespace: rhinopeak
spec:
  selector:
    app: rhinopeak
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http

---
apiVersion: v1
kind: Service
metadata:
  name: rhinopeak-frontend
  namespace: rhinopeak
spec:
  selector:
    app: rhinopeak
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rhinopeak-backend
  namespace: rhinopeak
spec:
  minReplicas: 2
  maxReplicas: 10
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rhinopeak-backend
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
